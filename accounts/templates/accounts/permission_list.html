{% extends 'accounts/base.html' %}

{% block content %}
<h1>Permissions</h1>
<p><a class="btn btn-primary" href="{% url 'accounts:permission_add' %}">Add Permission</a></p>

<table class="table">
  <thead><tr><th>Codename</th><th>Name</th><th>Actions</th></tr></thead>
  <tbody>
    {% for perm in object_list %}
    <tr>
      <td>{{ perm.codename }}</td>
      <td>{{ perm.name }}</td>
      <td>
        <a class="btn btn-sm btn-outline-primary" href="{% url 'accounts:permission_edit' perm.pk %}">Edit</a>
        <a class="btn btn-sm btn-outline-danger" href="{% url 'accounts:permission_delete' perm.pk %}">Delete</a>
      </td>
    </tr>
    {% empty %}
    <tr><td colspan="3">No permissions found.</td></tr>
    {% endfor %}
  </tbody>
</table>

{% endblock %}
