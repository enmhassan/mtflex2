{% extends 'accounts/base.html' %}

{% block content %}
  <h1>{% if form.instance.pk %}Edit Permission{% else %}Add Permission{% endif %}</h1>
  <form method="post">{% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-primary" type="submit">Save</button>
    <a class="btn btn-link" href="{% url 'accounts:permission_list' %}">Cancel</a>
  </form>
{% endblock %}
