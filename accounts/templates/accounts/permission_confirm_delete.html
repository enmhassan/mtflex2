{% extends 'accounts/base.html' %}

{% block content %}
  <h1>Delete Permission</h1>
  <p>Are you sure you want to delete "{{ object.codename }}"?</p>
  <form method="post">{% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-link" href="{% url 'accounts:permission_list' %}">Cancel</a>
  </form>
{% endblock %}
